kind = "web"
previewPath = "/"
title = "AIWatch"
version = "1.0.0"
id = "artifacts/aiwatch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23597

[services.development]
run = "pnpm --filter @workspace/aiwatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aiwatch", "run", "build" ]
publicDir = "artifacts/aiwatch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23597"
BASE_PATH = "/"
