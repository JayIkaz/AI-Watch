packages:
  "framer-motion": "For premium page transitions and micro-interactions"
  "date-fns": "For human-readable date formatting in the feed"
  "clsx": "For conditional class merging"
  "tailwind-merge": "For tailwind class conflict resolution"
  "react-hook-form": "For robust settings and API key forms"
  "@hookform/resolvers": "For Zod schema validation in forms"
